    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>escalera</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #122f65 0%, #400461 100%);
            color: #222;
            padding: 1em;
            min-height: 100vh;
        }

        .logo-svg {
            width: 170px;
            height: 88px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }

        .logo-svg svg {
            width: 100%;
            height: auto;
            animation: latido 2.5s ease-in-out infinite;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
        }

        @keyframes latido {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        header {
            position: sticky;
            top: 0;
            z-index: 999;
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            background: rgba(255,255,255,0.18);
            border: 1px solid rgba(255,255,255,0.164);
            padding: 1em;
            border-radius: 16px;
            max-width: 900px;
            margin: 0 auto 1em;
            box-shadow: 0 4px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            color: #fff;
            font-size: 2em;
            margin: 0.5em 0 0;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        section {
            padding: 2em 1.5em;
            margin: 1em auto;
            border-radius: 12px;
            max-width: 900px;
            background: rgba(255,255,255,0.233);
            backdrop-filter: blur(18px) saturate(160%);
            -webkit-backdrop-filter: blur(18px) saturate(160%);
            border: 1px solid rgba(255,255,255,0.103);
            box-shadow: 0 4px 25px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        section:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 30px rgba(0,0,0,0.15);
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5em;
        }

        .video {
            position: relative;
            cursor: pointer;
            background: rgba(255,255,255,0.116);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .video:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .video-title {
            padding: 1em;
            background: rgba(255,255,255,0.4);
            text-align: center;
            font-weight: 600;
            color: #fff;
            font-size: 1.1em;
            min-height: 2.5em;
            border-bottom: 2px solid rgba(255,255,255,0.3);
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }

        .video img { width: 100%; display: block; }

        .play-button {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3em;
            color: white;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
            opacity: 0.85;
            transition: transform 0.2s, opacity 0.2s;
        }

        .video:hover .play-button {
            transform: translate(-50%, -50%) scale(1.1);
            opacity: 1;
        }

        .video iframe {
            width: 100%;
            min-height: 250px;
        }

        /* --- Bloque embed (botón) --- */
        .embed-block {
            max-width: 900px;
            margin: 1em auto;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(255,255,255,0.233);
            backdrop-filter: blur(18px) saturate(160%);
            -webkit-backdrop-filter: blur(18px) saturate(160%);
            border: 1px solid rgba(255,255,255,0.103);
            box-shadow: 0 4px 25px rgba(0,0,0,0.1);
        }

        .embed-trigger {
            display: flex;
            align-items: center;
            gap: 0.8em;
            padding: 1.2em 1.5em;
            cursor: pointer;
            user-select: none;
            background: rgba(255,255,255,0.12);
            transition: background 0.2s;
        }

        .embed-trigger:hover { background: rgba(255,255,255,0.22); }

        .embed-trigger-icon {
            font-size: 1.4em;
            color: #02defd;
            display: inline-block;
        }

        .embed-trigger-text {
            color: #fff;
            font-weight: 700;
            font-size: 1.1em;
            text-shadow: 0 1px 4px rgba(0,0,0,0.3);
            flex: 1;
        }

        .embed-trigger-badge {
            font-size: 0.75em;
            background: linear-gradient(135deg, #02defd, #fe23fe);
            color: #fff;
            padding: 0.25em 0.75em;
            border-radius: 20px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        /* --- Overlay pantalla completa --- */
        .embed-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #0a0a14;
            flex-direction: column;
        }

        .embed-overlay.visible { display: flex; }

        .embed-overlay-bar {
            display: flex;
            align-items: center;
            gap: 1em;
            padding: 0.7em 1.2em;
            background: linear-gradient(90deg, #122f65, #400461);
            border-bottom: 2px solid rgba(2,222,253,0.25);
            flex-shrink: 0;
        }

        .embed-back-btn {
            display: flex;
            align-items: center;
            gap: 0.5em;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.25);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.95em;
            font-weight: 700;
            padding: 0.45em 1.1em;
            border-radius: 30px;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            white-space: nowrap;
        }

        .embed-back-btn:hover {
            background: rgba(2,222,253,0.2);
            transform: translateX(-3px);
        }

        .embed-overlay-title {
            color: #fff;
            font-weight: 700;
            font-size: 1em;
            text-shadow: 0 1px 6px rgba(0,0,0,0.4);
            flex: 1;
            text-align: center;
        }

        .embed-overlay-frame {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .embed-overlay-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .embed-loading {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1em;
            color: #fff;
            font-size: 1em;
            background: rgba(10,10,20,0.85);
            pointer-events: none;
            transition: opacity 0.4s;
        }

        .embed-loading.hidden { opacity: 0; }

        .spinner {
            width: 44px;
            height: 44px;
            border: 4px solid rgba(255,255,255,0.15);
            border-top-color: #02defd;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            body { padding: 0.5em; }
            .logo-svg { width: 130px; height: 68px; }
            h1 { font-size: 1.5em; }
            section { padding: 1.5em 1em; }
            .video-grid { grid-template-columns: 1fr; gap: 1em; }
            .video-title { font-size: 1em; padding: 0.8em; }
            .play-button { font-size: 2.5em; }
            .video iframe { min-height: 200px; }
            .embed-overlay-title { font-size: 0.85em; }
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.3em; }
            .logo-svg { width: 110px; height: 57px; }
            .video-title { font-size: 0.9em; }
            .embed-back-btn { font-size: 0.85em; padding: 0.4em 0.8em; }
        }
    </style>

        <div class="embed-trigger" id="embedTrigger">
            <span class="embed-trigger-icon">&#9658;</span>
            <span class="embed-trigger-text">Antes de que sea tarde</span>
            <span class="embed-trigger-badge">Ver aquí</span>
        </div>
    </div>

    <!-- Overlay pantalla completa -->
    <div class="embed-overlay" id="embedOverlay">
        <div class="embed-overlay-bar">
            <button class="embed-back-btn" id="embedBackBtn">
                &#8592; Volver al inicio
            </button>
            <span class="embed-overlay-title"></span>
            <div style="width:130px;"></div>
        </div>
        <div class="embed-overlay-frame" id="embedFrame">
            <div class="embed-loading" id="embedLoading">
                <div class="spinner"></div>
                <span>Cargando...</span>
            </div>
        </div>
    </div>

    <section id="videos">
        <div class="video-grid" id="videoGrid"></div>
    </section>

    <script>
        // --- Embed fullscreen ---
        const trigger  = document.getElementById('embedTrigger');
        const overlay  = document.getElementById('embedOverlay');
        const backBtn  = document.getElementById('embedBackBtn');
        const frame    = document.getElementById('embedFrame');
        const loading  = document.getElementById('embedLoading');
        let iframeLoaded = false;

        trigger.addEventListener('click', () => {
            overlay.classList.add('visible');
            document.body.style.overflow = 'hidden';
            if (!iframeLoaded) {
                iframeLoaded = true;
                const iframe = document.createElement('iframe');
                iframe.src = 'https://antes-de-que-sea-tarde.vercel.app/';
                iframe.allow = 'autoplay; fullscreen';
                iframe.onload = () => loading.classList.add('hidden');
                frame.appendChild(iframe);
            }
        });

        backBtn.addEventListener('click', () => {
            overlay.classList.remove('visible');
            document.body.style.overflow = '';
        });

        // --- Videos ---
        const videos = [
            { id: "l5n7UyMuOCA", title: "N8N está Muerto: El Sistema de $1M que Crea Activos de $100k en Minutos"},
            { id: "8QKKX41bdVk", title: "El MCP de Chrome ahora permite crear Apps 10X más Rápido!"},
            { id: "xVxwXxDid-4", title: "Domina el 90% de Claude Code en 37 Minutos"},
            { id: "6Gg4tmnMYCY", title: "aplicacion de 1500 Ds 3dias" },
            { id: "wbpnCKBb2DA", title: "Elon Musk Europa" },
            { id: "9j4BfbEFAdk", title: "Lanzamiento Oficial SaaS Factory" },
        ];

        const videoGrid = document.getElementById("videoGrid");
        let currentVideo = null;

        videos.forEach((video) => {
            const div = document.createElement("div");
            div.className = "video";
            div.dataset.id = video.id;
            div.innerHTML = `
                <div class="video-title">${video.title}</div>
                <img src="https://img.youtube.com/vi/${video.id}/hqdefault.jpg" alt="Video preview">
                <div class="play-button">&#9654;&#65039;</div>
            `;
            div.addEventListener("click", () => {
                if (currentVideo && currentVideo !== div) {
                    const prev = videos.find(v => v.id === currentVideo.dataset.id);
                    currentVideo.innerHTML = `
                        <div class="video-title">${prev.title}</div>
                        <img src="https://img.youtube.com/vi/${prev.id}/hqdefault.jpg" alt="Video preview">
                        <div class="play-button">&#9654;&#65039;</div>
                    `;
                }
                div.innerHTML = `
                    <iframe src="https://www.youtube.com/embed/${video.id}?autoplay=1"
                        frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                `;
                currentVideo = div;
            });
            videoGrid.appendChild(div);
        });
    </script>
